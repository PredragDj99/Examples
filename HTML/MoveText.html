    <!Doctype html>  
    <html>     
    <head>      
      <title>     
        Move the text  
       </title>  
    </head>  
    <body>   
        <marquee data-speed="200" width="400" style="border:  solid">Klasican primer</marquee><br><br>

        <marquee direction="left" width="500" data-gap="30" data-speed="200" behavior="alternate" style="border:SOLID" >  
        Ovaj tekst se pomera na levo brzinom 50!! :D 
        </marquee> <br><br>

        <marquee direction="up" height="100" width="300" data-speed="80"  style="border:SOLID" >  
            Ovaj tekst se pomera ka gore brzinom 80!! :D 
        </marquee>  <br><Br>
            
        <marquee direction="down" width="450" height="300" behavior="alternate" style="border:solid">
        <marquee behavior="alternate"> Alternate za odbijanje od ivice</marquee>
        </marquee><br><br>

        <marquee direction="right" width="450" height="30" behavior="alternate" style="border:solid" onmouseover="this.stop();" onmouseout="this.start();">
            Zaustavi tekst misem
        </marquee>            
    </body>   
    </html>
