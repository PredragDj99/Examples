<!DOCTYPE html>
<html>
<head>
<style>

</style>
</head>
<body onLoad=startTime()>

<br>
<label>Number of columns:</label>
<input id="columns" type="number" min="1"/>
<br><br>

<label>Number of rows:</label>
<input id="rows" type="number" min="1"/>
<br><br>
<input type="button" onclick="CreateTable()" value="Create table"/>

<br><br><br><hr><br>
<p id="txt">

<blockquote contenteditable="true">
Ne kapiram zasto nece edit za ovo dole :')
</blockquote>

<script>
function CreateTable() {
	var row = document.getElementById('rows').value;
    var column = document.getElementById('columns').value;
	
    try {
      if(row == "" || column == ""){
        throw "You need to input numbers";
      }
      else if(isNaN(row) || isNaN(column) || row<1 || column<1){
          throw "You need to input positive number";
      }else{
      
        const body = document.body,
        tbl = document.createElement('table');
  		tbl.style.width = '120px';
  		tbl.style.border = '3px solid red';

  		for (let i = 0; i < row; i++) {
    	  const tr = tbl.insertRow();
    		for (let j = 0; j < column; j++) {
        	  const td = tr.insertCell();    
        	  //td.appendChild(document.createTextNode(`Cell I${i}/J${j}`));

              blockquote = document.createElement('blockquote');
              blockquote.contenteditable = 'true';
              blockquote.innerHTML= "Cell: "+(i+1) +","+(j+1);
              
              td.appendChild(blockquote);
        	  td.style.border = '1px solid blue';
    		}
  		}
 		body.appendChild(tbl);
      }
  	}
  	catch(err) {
      alert(err);
  	}
}
</script>

</body>
</html>
