<!DOCTYPE html>
<html>
<head>
<style>
  .clock{
  background-color:red;
  width:120px;
  height:100px;
  position:relative;
  left:58px;
  top:50px;
  }
  .dig{
  	position:absolute;
  }
  .hour{
  	position:absolute;
    background-color:green;
    height:3px;
    width:3px;
  }
  .min{
  	position:absolute;
    background-color:blue;
    height:3px;
    width:3px;
  }
  .sec{

    background-color:orange;
    height:3px;
    width:3px;
  }
</style>
</head>
<body>
